<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Absensi UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Absensi UI</h1>

      <div class="card">
        <h2>Init Data</h2>
        <div class="grid">
          <label>
            Nama Admin
            <input id="initNamaAdmin" type="text" placeholder="Admin Satu" />
          </label>
          <label>
            Perusahaan
            <input id="initPerusahaan" type="text" placeholder="PT Contoh" />
          </label>
        </div>
        <button id="btnInitData">Init Data</button>
      </div>

      <div class="card">
        <h2>Login</h2>
        <div class="grid">
          <label>
            Username
            <input id="loginUsername" type="text" placeholder="admin" />
          </label>
          <label>
            Password
            <input id="loginPassword" type="password" placeholder="admin123" />
          </label>
        </div>
        <button id="btnLogin">Login</button>
        <button id="btnLogout" class="secondary">Logout</button>
        <div id="loginInfo" class="muted"></div>
      </div>

      <div class="card">
        <h2>Pegawai</h2>
        <div class="row">
          <button id="btnDaftarPegawai" class="secondary">GET /api/pegawai/daftar</button>
        </div>

        <h3>Tambah Pegawai</h3>
        <div class="grid">
          <label>
            Username
            <input id="tambahUsername" type="text" placeholder="user1" />
          </label>
          <label>
            Nama Lengkap
            <input id="tambahNama" type="text" placeholder="Pegawai 1" />
          </label>
        </div>
        <button id="btnTambahPegawai">POST /api/pegawai/admin-tambah-pegawai</button>
      </div>

      <div class="card">
        <h2>Presensi</h2>
        <div class="row">
          <button id="btnPresensiIn" class="secondary">GET /api/presensi/in</button>
          <button id="btnPresensiOut" class="secondary">GET /api/presensi/out</button>
        </div>

        <h3>Daftar Presensi Saya</h3>
        <div class="grid">
          <label>
            Tgl Awal
            <input id="tglAwal" type="date" />
          </label>
          <label>
            Tgl Akhir
            <input id="tglAkhir" type="date" />
          </label>
        </div>
        <button id="btnDaftarPresensiSaya">GET /api/presensi/daftar/pegawai</button>

        <h3>Daftar Presensi Admin</h3>
        <button id="btnDaftarPresensiAdmin" class="secondary">GET /api/presensi/daftar/admin</button>
      </div>

      <div class="card">
        <h2>Response</h2>
        <pre id="output"></pre>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
